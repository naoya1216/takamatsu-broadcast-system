<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>未課金車両流入</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="container">


<h1>💴 未課金車両流入</h1>



<label>発生時刻</label>

<input id="hour" placeholder="時">

<input id="minute" placeholder="分">



<label>流入料金所</label>

<select id="toll">

<option>鳴門本線料金所</option>
<option>坂出本線料金所</option>

</select>



<label>車種</label>

<input id="type" placeholder="例：普通車、大型車">


<label>車名</label>

<input id="name">



<label>車色</label>

<input id="color">



<label>車番（漢字）</label>

<input id="kanji" placeholder="例：香川">



<label>車番（数字）</label>

<input id="number1">



<label>車番（和文通話）</label>

<input id="kana" placeholder="例：あ（あさひのあ）">



<label>車番（数字後半）</label>

<input id="number2">



<label>特徴</label>

<input id="feature">



<button onclick="createUnpaidCommand()">

放送文作成

</button>



<textarea id="unpaidText"></textarea>



<button onclick="playUnpaidCommand()">

🔊 音声再生

</button>


<button onclick="stopUnpaidCommand()">

⏹ 停止

</button>



</div>



<script src="script.js"></script>


</body>

</html>
