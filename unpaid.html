<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<title>未課金車両流入</title>

<link rel="stylesheet" href="style.css">

</head>


<body>

<div class="container">


<h1>💴 未課金車両流入</h1>



<label>発生時刻</label>

<input id="hour" placeholder="時">

<input id="minute" placeholder="分">



<label>流入料金所</label>

<div class="inline-group">

    <select id="toll">
        <option>鳴門本線料金所</option>
        <option>坂出本線料金所</option>
    </select>

    <select id="lane">
        <option>一般レーン</option>
        <option>ETCレーン</option>
    </select>

</div>



<label>車種</label>

<select id="type">

    <option>不明</option>

    <option>軽乗用</option>

    <option>普通乗用</option>

    <option>小型貨物</option>

    <option>普通貨物</option>

    <option>大型貨物</option>

    <option>特大車</option>

    <option>自動二輪</option>

    <option>大型特殊</option>

</select>


<label>車名（空欄なら不明）</label>

<input
    type="text"
    id="name"
    placeholder="例：プリウス">


<label>車色（空欄なら不明）</label>

<input
    type="text"
    id="color"
    placeholder="例：白・黒・シルバー">



<label>車籍</label>

<select id="kanji">

    <option>不明</option>

    <option>徳島</option>
    <option>香川</option>
    <option>愛媛</option>
    <option>高知</option>

    <option>神戸</option>

    <option>大阪</option>

    <option>京都</option>

    <option>奈良</option>

    <option>滋賀</option>

    <option>三重</option>

    <option>岡山</option>
    <option>倉敷</option>

    <option>広島</option>
    <option>福山</option>

    <option>山口</option>
    <option>下関</option>

    <option>鳥取</option>

    <option>島根</option>

    <option>愛知</option>
    <option>豊橋</option>

    <option>尾張小牧</option>
    <option>一宮</option>

    <option>岐阜</option>

    <option>静岡</option>

    <option>沼津</option>

    <option>富士山</option>

    <option>品川</option>
    <option>世田谷</option>

    <option>横浜</option>

    <option>湘南</option>
    <option>相模</option>

    <option>千葉</option>
    <option>成田</option>
    <option>市川</option>
    <option>船橋</option>
    <option>習志野</option>
    <option>柏</option>

    <option>大宮</option>
    <option>川口</option>
    <option>川越</option>
    <option>所沢</option>
    <option>越谷</option>

    <option>水戸</option>

<label>車番（数字）</label>

<input id="number1">

<input id="number2">



<label>特徴</label>

<input id="feature">



<button onclick="createUnpaidCommand()">

</button>



<textarea id="unpaidText"></textarea>



<button onclick="playUnpaidCommand()">

</button>
